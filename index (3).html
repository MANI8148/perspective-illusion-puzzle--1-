<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Perspective Shift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --ink:       #1E1346;
  --ink-soft:  #6B5B9B;
  --ink-faint: rgba(30,19,70,.08);
  --glass:     rgba(255,255,255,.84);
  --glass-h:   rgba(255,255,255,.97);
  --accent:    #7C3AED;
  --accent-lo: rgba(124,58,237,.22);
  --blur:      blur(14px);
  --sh-s:      0 2px 12px rgba(30,19,70,.10);
  --sh-m:      0 6px 28px rgba(30,19,70,.14);
}
html,body { width:100%; height:100%; overflow:hidden; background:#EDE6FF;
            font-family:'Nunito',system-ui,sans-serif; }
#cv { position:fixed; inset:0; width:100%; height:100%; display:block; cursor:default; }
#cv.ptr { cursor:pointer; }
#ui { position:fixed; inset:0; pointer-events:none; z-index:20; }

/* ── top bar ── */
#topbar { position:absolute; top:0; left:0; right:0; padding:16px 20px;
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
#lcard { background:var(--glass); backdrop-filter:var(--blur); border-radius:20px;
  padding:12px 18px; box-shadow:var(--sh-s); border:1px solid rgba(255,255,255,.9);
  min-width:150px; }
#ltag  { font-size:10px; font-weight:800; letter-spacing:.1em; color:var(--accent);
  text-transform:uppercase; }
#lname { font-size:17px; font-weight:800; color:var(--ink); margin-top:2px; line-height:1.2; }
#lsub  { font-size:11px; color:var(--ink-soft); margin-top:2px; }
#dots  { display:flex; gap:10px; align-items:center; padding-top:8px; pointer-events:all; }
.dot   { width:11px; height:11px; border-radius:50%;
  background:rgba(124,58,237,.2); border:2px solid rgba(124,58,237,.35);
  cursor:pointer; transition:all .2s; }
.dot.on { background:var(--accent); border-color:var(--accent); transform:scale(1.35); }
.dot:hover:not(.on) { background:rgba(124,58,237,.5); transform:scale(1.15); }

/* ── view badge (top-centre) ── */
#vbadge { position:absolute; top:16px; left:50%; transform:translateX(-50%);
  background:var(--glass); backdrop-filter:var(--blur); border-radius:12px;
  padding:6px 18px; font-size:11px; font-weight:800; letter-spacing:.09em;
  color:var(--ink-soft); box-shadow:var(--sh-s); border:1px solid rgba(255,255,255,.9);
  pointer-events:none; transition:all .3s; white-space:nowrap; }
#vbadge.lit { background:rgba(255,209,102,.92); color:#5C3800;
  border-color:rgba(255,209,102,.9); box-shadow:0 4px 22px rgba(255,180,50,.45); }

/* ── illusion banner ── */
#banner { position:absolute; top:56px; left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:linear-gradient(135deg,#FFD166,#FFA94D);
  border-radius:100px; padding:7px 22px;
  font-size:12px; font-weight:800; color:#5C3800;
  box-shadow:0 4px 22px rgba(255,169,77,.45);
  pointer-events:none; opacity:0;
  transition:all .35s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; }
#banner.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── hint ── */
#hint { position:absolute; bottom:108px; left:50%; transform:translateX(-50%);
  background:var(--glass); backdrop-filter:var(--blur); border-radius:100px;
  padding:8px 22px; font-size:12px; font-weight:700; color:var(--ink-soft);
  box-shadow:var(--sh-s); border:1px solid rgba(255,255,255,.9);
  pointer-events:none; opacity:0; transition:opacity .4s; white-space:nowrap; }
#hint.show { opacity:1; }

/* ── controls ── */
#ctrls { position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  display:flex; gap:14px; align-items:center; pointer-events:all; }
.rbtn { width:52px; height:52px; border-radius:50%; border:none;
  background:var(--glass-h); backdrop-filter:var(--blur); color:var(--ink);
  font-size:20px; cursor:pointer; box-shadow:var(--sh-m);
  border:1px solid rgba(255,255,255,.95);
  display:flex; align-items:center; justify-content:center;
  transition:all .18s cubic-bezier(.34,1.56,.64,1); user-select:none; }
.rbtn:hover  { transform:scale(1.12); box-shadow:0 8px 28px var(--accent-lo); }
.rbtn:active { transform:scale(.93); }
#comp { background:var(--glass-h); backdrop-filter:var(--blur); border-radius:12px;
  padding:7px 18px; text-align:center; box-shadow:var(--sh-s);
  border:1px solid rgba(255,255,255,.95); min-width:86px; }
#clbl { font-size:9px; font-weight:800; letter-spacing:.12em;
  color:var(--ink-soft); text-transform:uppercase; }
#cdir { font-size:17px; font-weight:900; color:var(--ink); margin-top:1px; }

/* ── key legend ── */
#leg { position:absolute; bottom:24px; right:20px;
  background:var(--glass); backdrop-filter:var(--blur); border-radius:12px;
  padding:8px 14px; font-size:10px; font-weight:700; color:var(--ink-soft);
  box-shadow:var(--sh-s); border:1px solid rgba(255,255,255,.9);
  line-height:1.8; pointer-events:none; }
kbd { display:inline-block; background:var(--ink-faint); border-radius:4px;
  padding:1px 6px; font-family:monospace; color:var(--ink); font-size:9px; }

/* ── no-path toast ── */
#nop { position:absolute; top:52%; left:50%; transform:translate(-50%,-50%);
  background:var(--glass); backdrop-filter:var(--blur); border-radius:20px;
  padding:10px 24px; font-size:13px; font-weight:700; color:var(--ink-soft);
  box-shadow:var(--sh-s); pointer-events:none; opacity:0; transition:opacity .25s; }
#nop.show { opacity:1; }

/* ── win screen ── */
#win { display:none; position:absolute; inset:0;
  background:rgba(237,230,255,.9); backdrop-filter:blur(22px);
  flex-direction:column; align-items:center; justify-content:center;
  gap:14px; pointer-events:all; animation:fi .4s ease; }
#win.open { display:flex; }
@keyframes fi { from{opacity:0} to{opacity:1} }
#wico  { font-size:68px; animation:pop .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
#wtit  { font-size:34px; font-weight:900; color:var(--ink); letter-spacing:-.5px; }
#wsub  { font-size:15px; color:var(--ink-soft); }
.wbtn  { padding:13px 36px; border-radius:100px; border:none;
  font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; cursor:pointer;
  transition:all .2s cubic-bezier(.34,1.56,.64,1); }
#wnxt  { background:var(--accent); color:#fff; box-shadow:0 6px 28px var(--accent-lo); }
#wnxt:hover { transform:scale(1.06) translateY(-2px); }
#wag   { background:#fff; color:var(--ink); border:2px solid var(--ink-faint); }
#wag:hover  { background:#f5f0ff; transform:scale(1.04); }
</style>
</head>
<body>

<canvas id="cv"></canvas>
<div id="ui">
  <div id="topbar">
    <div id="lcard">
      <div id="ltag">Level 1 of 4</div>
      <div id="lname">Awakening</div>
      <div id="lsub">One perspective reveals all</div>
    </div>
    <div id="dots"></div>
  </div>
  <div id="vbadge">VIEW · NE</div>
  <div id="banner">✨ Hidden path revealed!</div>
  <div id="hint">💡 Rotate the camera — a bridge hides somewhere</div>
  <div id="ctrls">
    <button class="rbtn" id="bl" title="Rotate Left (A/←)">&#9664;</button>
    <div id="comp"><div id="clbl">View</div><div id="cdir">NE</div></div>
    <button class="rbtn" id="br" title="Rotate Right (D/→)">&#9654;</button>
  </div>
  <div id="leg">
    <kbd>A</kbd>/<kbd>←</kbd> rotate left<br>
    <kbd>D</kbd>/<kbd>→</kbd> rotate right<br>
    <kbd>Click</kbd> platform to move<br>
    <kbd>R</kbd> restart level
  </div>
  <div id="nop">No path — try rotating!</div>
  <div id="win">
    <div id="wico">🏆</div>
    <div id="wtit">Level Complete!</div>
    <div id="wsub">You bent reality to reach the goal.</div>
    <button class="wbtn" id="wnxt" onclick="Game.nextLevel()">Next Level →</button>
    <button class="wbtn" id="wag"  onclick="Game.restartLevel()">Play Again</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const CFG = {
  camR:14, camH:14, ortho:9,
  movLerp:5.5, camLerp:3.8, arc:.45, floatA:.065, floatS:1.6,
  // Isometric camera positions (azimuth degrees).
  // Illusion alignment rule:
  //   angles NE(0) & SW(2): platforms with equal (x+z) appear same height
  //   angles NW(1) & SE(3): platforms with equal (x-z) appear same height
  angles:[45,135,225,315], compass:['NE','NW','SW','SE'],
};

// ═══════════════════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════════════════
const P = {
  sky:0xEDE6FF, player:0xFF6B6B, start:0x95D5B2, goal:0xFFD166,
  ghost:0x88AAFF, hl:0xFFE566,
  // Per-level: [platform, pillar, accent]
  lvl:[
    [0xB8D4E3, 0xC5B8D8, 0xCFD8DC],
    [0xFFCCBC, 0xFFAB91, 0xE8C8B4],
    [0xC8E6C9, 0xA5D6A7, 0xB2D8B2],
    [0xE1BEE7, 0xCE93D8, 0xD4AAE0],
  ],
};

// ═══════════════════════════════════════════════════════════════
//  LEVEL DATA
//  Illusory pairs are positioned so that at their reqAngle, they
//  share the same apparent screen height (proven by alignment axis).
//
//  NW/SE (angle 1 or 3) illusions: nodes share (x−z) value.
//  NE/SW (angle 0 or 2) illusions: nodes share (x+z) value.
// ═══════════════════════════════════════════════════════════════
const LEVELS = [

  // ── Level 1: Awakening ── one illusion (NW, angle 1) ──
  // n4(4,2,0) x-z=4   n5(5,2,1) x-z=4  → same height at NW ✓
  {
    name:'Awakening', sub:'One perspective reveals all',
    center:[3.5,1.2,1], startAngle:0, startNode:'n0', goalNode:'n7',
    nodes:[
      {id:'n0', pos:[0,0,2], type:'start'},
      {id:'n1', pos:[0,0,0], type:'platform'},
      {id:'n2', pos:[2,0,0], type:'platform'},
      {id:'n3', pos:[3,1,0], type:'platform'},
      {id:'n4', pos:[4,2,0], type:'platform'}, // ILLUSION A  x-z=4
      {id:'n5', pos:[5,2,1], type:'platform'}, // ILLUSION B  x-z=4 ✓
      {id:'n6', pos:[6,2,2], type:'platform'},
      {id:'n7', pos:[7,2,3], type:'goal'},
    ],
    edges:[
      {from:'n0',to:'n1',type:'physical'},
      {from:'n1',to:'n2',type:'physical'},
      {from:'n2',to:'n3',type:'physical'},
      {from:'n3',to:'n4',type:'physical'},
      {from:'n4',to:'n5',type:'illusory',reqAngle:1}, // ← THE GAP
      {from:'n5',to:'n6',type:'physical'},
      {from:'n6',to:'n7',type:'physical'},
    ],
  },

  // ── Level 2: The Crossing ── two illusions (NW·1 and SW·2) ──
  // Gap 1: n4(2,2,0) x-z=2   n5(3,2,1) x-z=2  ✓  (NW)
  // Gap 2: n8(4,4,2) x+z=6   n9(2,4,4) x+z=6  ✓  (SW)
  {
    name:'The Crossing', sub:'Two bridges, two perspectives',
    center:[1.5,2.5,2.5], startAngle:0, startNode:'n0', goalNode:'n11',
    nodes:[
      {id:'n0',  pos:[-2,0, 2], type:'start'},
      {id:'n1',  pos:[ 0,0, 2], type:'platform'},
      {id:'n2',  pos:[ 0,0, 0], type:'platform'},
      {id:'n3',  pos:[ 1,1, 0], type:'platform'},
      {id:'n4',  pos:[ 2,2, 0], type:'platform'}, // GAP 1 A  x-z=2
      {id:'n5',  pos:[ 3,2, 1], type:'platform'}, // GAP 1 B  x-z=2 ✓
      {id:'n6',  pos:[ 4,2, 2], type:'platform'},
      {id:'n7',  pos:[ 4,3, 2], type:'platform'},
      {id:'n8',  pos:[ 4,4, 2], type:'platform'}, // GAP 2 A  x+z=6
      {id:'n9',  pos:[ 2,4, 4], type:'platform'}, // GAP 2 B  x+z=6 ✓
      {id:'n10', pos:[ 0,4, 4], type:'platform'},
      {id:'n11', pos:[-2,4, 4], type:'goal'},
    ],
    edges:[
      {from:'n0', to:'n1',  type:'physical'},
      {from:'n1', to:'n2',  type:'physical'},
      {from:'n2', to:'n3',  type:'physical'},
      {from:'n3', to:'n4',  type:'physical'},
      {from:'n4', to:'n5',  type:'illusory', reqAngle:1}, // NW
      {from:'n5', to:'n6',  type:'physical'},
      {from:'n6', to:'n7',  type:'physical'},
      {from:'n7', to:'n8',  type:'physical'},
      {from:'n8', to:'n9',  type:'illusory', reqAngle:2}, // SW
      {from:'n9', to:'n10', type:'physical'},
      {from:'n10',to:'n11', type:'physical'},
    ],
  },

  // ── Level 3: The Garden ── dead-end + two illusions (NW·1, SW·2) ──
  // Dead-end: n3a→n4a  (south branch — tempts wrong path)
  // Gap 1: n5(2,2,4) x-z=-2   n6(3,2,5) x-z=-2  ✓  (NW)
  // Gap 2: n10(2,4,4) x+z=6   n11(3,4,3) x+z=6  ✓  (SW)
  {
    name:'The Garden', sub:'Not all paths lead forward',
    center:[0,2,2], startAngle:0, startNode:'n0', goalNode:'n14',
    nodes:[
      {id:'n0',  pos:[-4,0, 0], type:'start'},
      {id:'n1',  pos:[-2,0, 0], type:'platform'},
      {id:'n2',  pos:[ 0,0, 0], type:'platform'},
      {id:'n3a', pos:[ 0,0,-2], type:'platform'}, // dead-end branch
      {id:'n4a', pos:[ 0,0,-4], type:'platform'}, // dead end
      {id:'n3',  pos:[ 0,1, 2], type:'platform'},
      {id:'n4',  pos:[ 0,2, 4], type:'platform'},
      {id:'n5',  pos:[ 2,2, 4], type:'platform'}, // GAP 1 A  x-z=-2
      {id:'n6',  pos:[ 3,2, 5], type:'platform'}, // GAP 1 B  x-z=-2 ✓
      {id:'n7',  pos:[ 4,2, 6], type:'platform'},
      {id:'n8',  pos:[ 4,3, 6], type:'platform'},
      {id:'n9',  pos:[ 4,4, 4], type:'platform'},
      {id:'n10', pos:[ 2,4, 4], type:'platform'}, // GAP 2 A  x+z=6
      {id:'n11', pos:[ 3,4, 3], type:'platform'}, // GAP 2 B  x+z=6 ✓
      {id:'n12', pos:[ 4,4, 2], type:'platform'},
      {id:'n13', pos:[ 4,4, 0], type:'platform'},
      {id:'n14', pos:[ 4,4,-2], type:'goal'},
    ],
    edges:[
      {from:'n0', to:'n1',  type:'physical'},
      {from:'n1', to:'n2',  type:'physical'},
      {from:'n2', to:'n3a', type:'physical'},   // dead-end branch
      {from:'n3a',to:'n4a', type:'physical'},
      {from:'n2', to:'n3',  type:'physical'},   // real path
      {from:'n3', to:'n4',  type:'physical'},
      {from:'n4', to:'n5',  type:'physical'},
      {from:'n5', to:'n6',  type:'illusory', reqAngle:1}, // NW
      {from:'n6', to:'n7',  type:'physical'},
      {from:'n7', to:'n8',  type:'physical'},
      {from:'n8', to:'n9',  type:'physical'},
      {from:'n9', to:'n10', type:'physical'},
      {from:'n10',to:'n11', type:'illusory', reqAngle:2}, // SW
      {from:'n11',to:'n12', type:'physical'},
      {from:'n12',to:'n13', type:'physical'},
      {from:'n13',to:'n14', type:'physical'},
    ],
  },

  // ── Level 4: The Labyrinth ── three illusions (NE·0, NW·1, SE·3) ──
  // Gap 1: n4(0,2,0) x+z=0   n5(-1,2,1) x+z=0  ✓  (NE)
  // Gap 2: n9(-4,4,-2) x-z=-2  n10(-3,4,-1) x-z=-2  ✓  (NW)
  // Gap 3: n13(0,4,-2) x-z=2   n14(1,4,-1) x-z=2   ✓  (SE, same axis as NW)
  {
    name:'The Labyrinth', sub:'Reality is just a perspective',
    center:[0,2,0], startAngle:0, startNode:'n0', goalNode:'n16',
    nodes:[
      {id:'n0',  pos:[-4,0, 4], type:'start'},
      {id:'n1',  pos:[-2,0, 4], type:'platform'},
      {id:'n2',  pos:[ 0,0, 4], type:'platform'},
      {id:'n3',  pos:[ 0,1, 2], type:'platform'},
      {id:'n4',  pos:[ 0,2, 0], type:'platform'}, // GAP 1 A  x+z=0
      {id:'n5',  pos:[-1,2, 1], type:'platform'}, // GAP 1 B  x+z=0 ✓
      {id:'n6',  pos:[-2,2, 2], type:'platform'},
      {id:'n7',  pos:[-4,2, 2], type:'platform'},
      {id:'n8',  pos:[-4,3, 0], type:'platform'},
      {id:'n9',  pos:[-4,4,-2], type:'platform'}, // GAP 2 A  x-z=-2
      {id:'n10', pos:[-3,4,-1], type:'platform'}, // GAP 2 B  x-z=-2 ✓
      {id:'n11', pos:[-2,4, 0], type:'platform'},
      {id:'n12', pos:[ 0,4, 0], type:'platform'},
      {id:'n13', pos:[ 0,4,-2], type:'platform'}, // GAP 3 A  x-z=2
      {id:'n14', pos:[ 1,4,-1], type:'platform'}, // GAP 3 B  x-z=2 ✓
      {id:'n15', pos:[ 2,4,-2], type:'platform'},
      {id:'n16', pos:[ 4,4,-4], type:'goal'},
    ],
    edges:[
      {from:'n0', to:'n1',  type:'physical'},
      {from:'n1', to:'n2',  type:'physical'},
      {from:'n2', to:'n3',  type:'physical'},
      {from:'n3', to:'n4',  type:'physical'},
      {from:'n4', to:'n5',  type:'illusory', reqAngle:0}, // NE (default angle!)
      {from:'n5', to:'n6',  type:'physical'},
      {from:'n6', to:'n7',  type:'physical'},
      {from:'n7', to:'n8',  type:'physical'},
      {from:'n8', to:'n9',  type:'physical'},
      {from:'n9', to:'n10', type:'illusory', reqAngle:1}, // NW
      {from:'n10',to:'n11', type:'physical'},
      {from:'n11',to:'n12', type:'physical'},
      {from:'n12',to:'n13', type:'physical'},
      {from:'n13',to:'n14', type:'illusory', reqAngle:3}, // SE
      {from:'n14',to:'n15', type:'physical'},
      {from:'n15',to:'n16', type:'physical'},
    ],
  },

];

// ═══════════════════════════════════════════════════════════════
//  SCENE  — renderer, scene, lights
// ═══════════════════════════════════════════════════════════════
const Scene = (() => {
  let sc, rd;
  function init() {
    sc = new THREE.Scene();
    sc.background = new THREE.Color(P.sky);
    sc.fog = new THREE.FogExp2(P.sky, 0.021);
    rd = new THREE.WebGLRenderer({canvas:document.getElementById('cv'), antialias:true});
    rd.setPixelRatio(Math.min(devicePixelRatio,2));
    rd.shadowMap.enabled = true;
    rd.shadowMap.type = THREE.PCFSoftShadowMap;
    rd.setSize(innerWidth, innerHeight);
    window.addEventListener('resize', () => { rd.setSize(innerWidth,innerHeight); Cam.resize(); });
  }
  function lights() {
    sc.add(new THREE.AmbientLight(0xffffff, .56));
    const sun = new THREE.DirectionalLight(0xFFF5E4, 1.08);
    sun.position.set(10,20,8); sun.castShadow = true;
    sun.shadow.mapSize.set(2048,2048);
    Object.assign(sun.shadow.camera,{near:.5,far:80,left:-28,right:28,top:28,bottom:-28});
    sun.shadow.bias = -.001;
    sc.add(sun);
    const fill = new THREE.DirectionalLight(0xC0E0FF, .3);
    fill.position.set(-8,5,-8); sc.add(fill);
  }
  function wipe() {
    const rm = []; sc.traverse(o => { if(o.userData.lv) rm.push(o); });
    rm.forEach(o => sc.remove(o));
  }
  function add(o) { sc.add(o); }
  return { init, lights, wipe, add, get s(){return sc;}, get r(){return rd;} };
})();

// ═══════════════════════════════════════════════════════════════
//  CAMERA  — orthographic, 4-stop isometric
// ═══════════════════════════════════════════════════════════════
const Cam = (() => {
  let cam, ci=0, ti=0;
  const cp=new THREE.Vector3(), tp=new THREE.Vector3(), la=new THREE.Vector3();
  let spin=false;
  function init() {
    const a=innerWidth/innerHeight, s=CFG.ortho;
    cam = new THREE.OrthographicCamera(-s*a,s*a,s,-s,.1,120);
    _snap(0);
  }
  function _p(i) {
    const r=CFG.angles[i]*Math.PI/180;
    return new THREE.Vector3(CFG.camR*Math.cos(r), CFG.camH, CFG.camR*Math.sin(r));
  }
  function _snap(i) {
    ci=ti=i; tp.copy(_p(i)); cp.copy(tp);
    cam.position.copy(cp); cam.lookAt(la); cam.updateProjectionMatrix(); _ui(i);
  }
  function rotate(d) {
    if(spin) return; ti=((ci+d)%4+4)%4; tp.copy(_p(ti)); spin=true; _ui(ti);
  }
  function update(dt) {
    if(!spin) return;
    cp.lerp(tp, dt*CFG.camLerp); cam.position.copy(cp); cam.lookAt(la);
    if(cp.distanceTo(tp)<.018) {
      spin=false; ci=ti; cp.copy(tp); cam.position.copy(cp);
      Persp.onAngle(ci);
    }
  }
  function look(x,y,z) { la.set(x,y,z); cam.lookAt(la); }
  function reset(i) { _snap(i); Persp.onAngle(i); }
  function resize() {
    if(!cam) return;
    const a=innerWidth/innerHeight, s=CFG.ortho;
    cam.left=-s*a; cam.right=s*a; cam.top=s; cam.bottom=-s;
    cam.updateProjectionMatrix();
  }
  function _ui(i) {
    const n=CFG.compass[i];
    document.getElementById('cdir').textContent=n;
    document.getElementById('vbadge').textContent=`VIEW · ${n}`;
  }
  return { init, rotate, update, look, reset, resize,
    get cam(){return cam;}, get spinning(){return spin;}, get idx(){return ci;} };
})();

// ═══════════════════════════════════════════════════════════════
//  BUILDER  — Three.js geometry for nodes and ghost bridges
// ═══════════════════════════════════════════════════════════════
const Builder = (() => {
  const mm={};  // meshMap: nodeId → Group
  const gb=[];  // ghostBridges: [{line,plank,dot,reqAngle}]

  function build(lv, li) {
    Object.keys(mm).forEach(k=>delete mm[k]); gb.length=0;
    const pal = P.lvl[li % P.lvl.length];
    lv.nodes.forEach(n => _node(n, pal));
    lv.edges.filter(e=>e.type==='illusory').forEach(e => _ghost(e,lv));
  }

  function _node(nd, pal) {
    const [x,y,z] = nd.pos;
    const g = new THREE.Group();
    g.position.set(x,y,z); g.userData.lv=true; g.userData.id=nd.id;

    const pc = nd.type==='start' ? P.start : nd.type==='goal' ? P.goal : pal[0];
    const SH = .28;

    // Slab
    const sl = _m(new THREE.BoxGeometry(1.85,SH,1.85), pc, true);
    sl.position.y=SH*.5; sl.userData.click=true; sl.userData.id=nd.id; g.add(sl);
    // Trim
    const tr = _m(new THREE.BoxGeometry(1.85,.05,1.85), _dim(pc,.12));
    tr.position.y=SH-.025; g.add(tr);
    // Pillar
    const ph=y+.3;
    if(ph>.22) {
      const pi = _m(new THREE.BoxGeometry(.38,ph,.38), pal[1], true);
      pi.position.y=-ph*.5+.01; g.add(pi);
      if(ph>2.5) {
        const b1=_m(new THREE.BoxGeometry(.14,.14,.38),pal[1]);
        b1.position.y=-ph*.28; g.add(b1);
        const b2=_m(new THREE.BoxGeometry(.38,.14,.14),pal[1]);
        b2.position.y=-ph*.55; g.add(b2);
      }
    }
    // Shadow plate
    const pl = _m(new THREE.BoxGeometry(1.88,.04,1.88), 0xDDD0EE);
    pl.material.transparent=true; pl.material.opacity=.35;
    pl.position.y=-y+.02; pl.receiveShadow=true; g.add(pl);

    // Goal gem
    if(nd.type==='goal') {
      const gm = _m(new THREE.OctahedronGeometry(.30,0), 0xFFAA00, true);
      gm.position.y=.72; gm.userData.gem=true; g.add(gm);
      const rg = _m(new THREE.TorusGeometry(.40,.055,6,14), P.goal);
      rg.position.y=.46; rg.rotation.x=Math.PI/2; g.add(rg);
    }
    // Start marker
    if(nd.type==='start') {
      const mk = _m(new THREE.CylinderGeometry(.11,.11,.46,6), 0x00B07A);
      mk.position.y=.50; g.add(mk);
    }
    // Highlight overlay
    const hl = _m(new THREE.BoxGeometry(1.9,.055,1.9), P.hl);
    hl.material.transparent=true; hl.material.opacity=0;
    hl.position.y=SH+.04; hl.userData.hl=true; g.add(hl);

    Scene.add(g); mm[nd.id]=g;
  }

  function _ghost(e, lv) {
    const na=lv.nodes.find(n=>n.id===e.from), nb=lv.nodes.find(n=>n.id===e.to);
    if(!na||!nb) return;
    const pa=new THREE.Vector3(...na.pos), pb=new THREE.Vector3(...nb.pos);
    const mid=pa.clone().add(pb).multiplyScalar(.5);
    const dir=pb.clone().sub(pa), len=dir.length();

    // Dashed line
    const lpts=[pa.clone().setY(pa.y+.42), pb.clone().setY(pb.y+.42)];
    const lgeo=new THREE.BufferGeometry().setFromPoints(lpts);
    const lmat=new THREE.LineDashedMaterial({color:P.ghost,dashSize:.38,gapSize:.18,transparent:true,opacity:0});
    const line=new THREE.Line(lgeo,lmat); line.computeLineDistances(); line.userData.lv=true;

    // Plank
    const plk=_m(new THREE.BoxGeometry(.52,.09,Math.max(len-.12,.1)), P.ghost);
    plk.material.transparent=true; plk.material.opacity=0;
    plk.position.copy(mid).setY(mid.y+.40);
    plk.lookAt(mid.x+dir.x, plk.position.y, mid.z+dir.z);
    plk.userData.lv=true;

    // Midpoint marker sphere
    const dot=_m(new THREE.SphereGeometry(.12,8,6), P.ghost);
    dot.material.transparent=true; dot.material.opacity=0;
    dot.position.copy(mid).setY(mid.y+.7); dot.userData.lv=true;

    Scene.add(line); Scene.add(plk); Scene.add(dot);
    gb.push({line,plk,dot,reqAngle:e.reqAngle});
  }

  function updateGhosts(angle) {
    let any=false;
    gb.forEach(g => {
      const on=g.reqAngle===angle; if(on) any=true;
      g.line.material.opacity = on?.92:0;
      g.plk.material.opacity  = on?.62:0;
      g.plk.material.color.set(on?0x99CCFF:P.ghost);
      g.dot.material.opacity  = on?.8:0;
    });
    return any;
  }

  function setHL(ids) {
    Object.entries(mm).forEach(([id,grp]) => {
      grp.traverse(c => { if(c.userData.hl) c.material.opacity = ids.includes(id)?.72:0; });
    });
  }

  function anim(t) {
    const lv=LevelMgr.cur; if(!lv) return;
    Object.entries(mm).forEach(([id,g]) => {
      const nd=lv.nodes.find(n=>n.id===id); if(!nd) return;
      g.position.y = nd.pos[1] + Math.sin(t*CFG.floatS+nd.pos[0]*.4+nd.pos[2]*.3)*CFG.floatA;
      g.traverse(c => {
        if(c.userData.gem) { c.rotation.y=t*1.3; c.position.y=.72+Math.sin(t*2.4)*.06; }
      });
    });
  }

  function _m(geo, col, shadow) {
    const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:col}));
    if(shadow){m.castShadow=true; m.receiveShadow=true;} return m;
  }
  function _dim(hex,a) {
    return (((hex>>16&255)*(1-a)<<16)|((hex>>8&255)*(1-a)<<8)|((hex&255)*(1-a)))>>>0;
  }

  function grp(id) { return mm[id]; }
  function clickables() {
    const r=[]; Scene.s.traverse(o=>{if(o.userData.click) r.push(o);}); return r;
  }

  return { build, updateGhosts, setHL, anim, grp, clickables };
})();

// ═══════════════════════════════════════════════════════════════
//  PERSPECTIVE SYSTEM  — BFS, edge gating, angle effects
// ═══════════════════════════════════════════════════════════════
const Persp = (() => {
  let ang=0, lv=null, active=[];
  let _bt; // banner timer

  function setLevel(l) { lv=l; _rebuild(ang); }

  function onAngle(a) {
    ang=a; _rebuild(a);
    const anyGhost = Builder.updateGhosts(a);
    _badge(anyGhost);
    _hint();
    const rch=reach(Player.node);
    Builder.setHL(rch.filter(id=>id!==Player.node));
  }

  function _rebuild(a) {
    if(!lv){active=[];return;}
    active = lv.edges.filter(e => e.type==='physical' || (e.type==='illusory' && e.reqAngle===a));
  }

  function reach(from) {
    if(!from) return [];
    const vis=new Set([from]), q=[from];
    while(q.length){
      const c=q.shift();
      active.forEach(e=>{
        const nb=e.from===c?e.to:e.to===c?e.from:null;
        if(nb&&!vis.has(nb)){vis.add(nb);q.push(nb);}
      });
    }
    return [...vis];
  }

  function findPath(from,to) {
    if(from===to) return [from];
    const prev=new Map([[from,null]]), q=[from];
    while(q.length){
      const c=q.shift();
      for(const e of active){
        const nb=e.from===c?e.to:e.to===c?e.from:null;
        if(nb&&!prev.has(nb)){
          prev.set(nb,c);
          if(nb===to){
            const p=[]; let n=to;
            while(n!==null){p.unshift(n);n=prev.get(n);}
            return p;
          }
          q.push(nb);
        }
      }
    }
    return null;
  }

  function _badge(lit) {
    const b=document.getElementById('vbadge'), bn=document.getElementById('banner');
    b.classList.toggle('lit',lit);
    if(lit){
      bn.classList.add('show'); clearTimeout(_bt);
      _bt=setTimeout(()=>bn.classList.remove('show'),2400);
    }
  }

  function _hint() {
    if(!lv) return;
    const gr=reach(Player.node);
    const hasGoal=gr.includes(lv.goalNode);
    const hasMore=lv.edges.some(e=>e.type==='illusory'&&e.reqAngle!==ang);
    document.getElementById('hint').classList.toggle('show',!hasGoal&&hasMore);
  }

  return { setLevel, onAngle, reach, findPath, get angle(){return ang;} };
})();

// ═══════════════════════════════════════════════════════════════
//  PLAYER  — sphere, lerp movement along BFS path
// ═══════════════════════════════════════════════════════════════
const Player = (() => {
  let mesh, nd=null, wp=[], wi=0, mv=false, t=0;
  const p0=new THREE.Vector3(), p1=new THREE.Vector3();

  function init() {
    mesh=new THREE.Mesh(new THREE.SphereGeometry(.32,20,16),
      new THREE.MeshLambertMaterial({color:P.player}));
    mesh.castShadow=true; Scene.add(mesh);
  }

  function spawn(id) {
    nd=id; wp=[]; mv=false;
    const pos=_np(id); if(pos){mesh.position.copy(pos);mesh.position.y+=.55;}
  }

  function moveTo(tgt) {
    if(mv||tgt===nd) return false;
    const path=Persp.findPath(nd,tgt);
    if(!path||path.length<2) return false;
    wp=path; wi=1; _seg(); return true;
  }

  function _seg() {
    if(wi>=wp.length){
      mv=false;
      const r=Persp.reach(nd); Builder.setHL(r.filter(id=>id!==nd));
      if(nd===LevelMgr.cur?.goalNode) setTimeout(()=>Game.win(),320);
      return;
    }
    mv=true; t=0; p0.copy(mesh.position);
    const pos=_np(wp[wi]); p1.copy(pos); p1.y+=.55;
  }

  function update(dt,time) {
    if(!mv){
      const pos=_np(nd); if(pos) mesh.position.y=pos.y+.55+Math.sin(time*2.7)*.034;
      return;
    }
    t=Math.min(t+dt*CFG.movLerp,1);
    mesh.position.lerpVectors(p0,p1,t);
    mesh.position.y+=Math.sin(t*Math.PI)*CFG.arc;
    if(t>=1){nd=wp[wi++]; mesh.position.copy(p1); _seg();}
  }

  function _np(id) {
    const n=LevelMgr.cur?.nodes.find(n=>n.id===id);
    return n ? new THREE.Vector3(...n.pos) : null;
  }

  return { init, spawn, moveTo, update,
    get node(){return nd;}, get busy(){return mv;} };
})();

// ═══════════════════════════════════════════════════════════════
//  LEVEL MANAGER
// ═══════════════════════════════════════════════════════════════
const LevelMgr = (() => {
  let cur=null, idx=-1;

  function load(i) {
    i=Math.max(0,Math.min(i,LEVELS.length-1));
    Scene.wipe(); cur=LEVELS[i]; idx=i;
    const c=cur.center||[0,0,0];
    Cam.look(...c); Cam.reset(cur.startAngle||0);
    Builder.build(cur,i);
    Persp.setLevel(cur);
    Player.spawn(cur.startNode);
    Persp.onAngle(cur.startAngle||0);
    _ui(i); document.getElementById('win').classList.remove('open');
  }
  function _ui(i) {
    document.getElementById('ltag').textContent=`Level ${i+1} of ${LEVELS.length}`;
    document.getElementById('lname').textContent=LEVELS[i].name;
    document.getElementById('lsub').textContent=LEVELS[i].sub;
    document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('on',j===i));
  }

  return { load, get cur(){return cur;}, get idx(){return idx;} };
})();

// ═══════════════════════════════════════════════════════════════
//  INPUT  — raycasting, keyboard
// ═══════════════════════════════════════════════════════════════
const Input = (() => {
  const rc=new THREE.Raycaster(), ms=new THREE.Vector2(); let _nt;

  function init() {
    const cv=document.getElementById('cv');
    cv.addEventListener('click',e=>_click(e.clientX,e.clientY));
    cv.addEventListener('touchend',e=>{
      e.preventDefault();
      if(e.changedTouches[0]) _click(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    },{passive:false});
    cv.addEventListener('mousemove',e=>_hover(e.clientX,e.clientY));
    document.addEventListener('keydown',e=>{
      if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') Game.rot(-1);
      if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') Game.rot(1);
      if(e.key==='r'||e.key==='R') Game.restart();
    });
    document.getElementById('bl').addEventListener('click',()=>Game.rot(-1));
    document.getElementById('br').addEventListener('click',()=>Game.rot(1));
  }

  function _cast(cx,cy) {
    ms.x=(cx/innerWidth)*2-1; ms.y=-(cy/innerHeight)*2+1;
    rc.setFromCamera(ms,Cam.cam);
    return rc.intersectObjects(Builder.clickables());
  }
  function _click(cx,cy) {
    if(Cam.spinning||Player.busy) return;
    const h=_cast(cx,cy); if(!h.length) return;
    const id=h[0].object.userData.id;
    if(!id||id===Player.node) return;
    if(!Player.moveTo(id)) _noPath();
  }
  function _hover(cx,cy) {
    document.getElementById('cv').classList.toggle('ptr',_cast(cx,cy).length>0);
  }
  function _noPath() {
    const el=document.getElementById('nop');
    el.classList.add('show'); clearTimeout(_nt);
    _nt=setTimeout(()=>el.classList.remove('show'),1800);
  }
  return { init };
})();

// ═══════════════════════════════════════════════════════════════
//  GAME  — boot + animation loop
// ═══════════════════════════════════════════════════════════════
const Game = (() => {
  let running=false, lt=0;

  function init() {
    Scene.init(); Scene.lights(); Cam.init(); Player.init(); Input.init();
    // Build level dots
    const c=document.getElementById('dots');
    LEVELS.forEach((l,i)=>{
      const d=document.createElement('div');
      d.className='dot'+(i===0?' on':''); d.title=l.name;
      d.addEventListener('click',()=>LevelMgr.load(i)); c.appendChild(d);
    });
    LevelMgr.load(0);
    running=true; requestAnimationFrame(_loop);
  }

  function rot(d) { if(!Cam.spinning) Cam.rotate(d); }

  function win() {
    const ws=document.getElementById('win'); ws.classList.add('open');
    const last=LevelMgr.idx>=LEVELS.length-1;
    document.getElementById('wnxt').style.display=last?'none':'';
    document.getElementById('wtit').textContent=last?'🎉 All Done!':'Level Complete!';
    document.getElementById('wsub').textContent=last
      ?'You mastered every perspective.':'You bent reality to reach the goal.';
    document.getElementById('wico').textContent=last?'🎊':'🏆';
  }

  function nextLevel()  { LevelMgr.load(LevelMgr.idx+1); }
  function restart()    { LevelMgr.load(LevelMgr.idx); }
  function restartLevel(){ restart(); }

  function _loop(ts) {
    if(!running) return;
    requestAnimationFrame(_loop);
    const dt=Math.min((ts-lt)/1000,.05); lt=ts;
    Cam.update(dt); Player.update(dt,ts/1000); Builder.anim(ts/1000);
    Scene.r.render(Scene.s,Cam.cam);
  }

  return { init, rot, win, nextLevel, restart, restartLevel };
})();

window.addEventListener('load', () => Game.init());
</script>
